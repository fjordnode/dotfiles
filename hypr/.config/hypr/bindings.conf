# Hyprland keybindings — mirrors Niri/DMS layout

# --- Application Launchers ---
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- kitty
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- kitty tmux
bindd = SUPER, SPACE, App launcher, exec, walker
bindd = SUPER, B, Focus/open Firefox, exec, sh -c 'id=$(hyprctl clients -j | jq -r ".[] | select(.class | test(\"firefox$\")) | .address" | head -1); [ -n "$id" ] && hyprctl dispatch focuswindow address:$id || firefox'
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus
bindd = SUPER SHIFT, N, Editor, exec, uwsm-app -- kitty -e nvim
bindd = SUPER SHIFT, D, Docker, exec, uwsm-app -- kitty -e lazydocker

# --- Scratchpad (ndrop) ---
bindd = SUPER, S, Scratchpad, exec, hypr-scratchpad
bindd = SUPER CTRL, S, Move to scratchpad, movetoworkspace, special:scratchpad

windowrule = float on, match:class ^hypr-scratchpad$
windowrule = size 80% 40%, match:class ^hypr-scratchpad$
windowrule = center on, match:class ^hypr-scratchpad$

# --- Copy/Paste (macOS-style) ---
bindd = SUPER, C, Copy, exec, niri-copy
bindd = SUPER, V, Paste, exec, niri-paste
bindd = SUPER, X, Cut, exec, wtype -M ctrl -k x

# --- Clipboard (Yoink) ---
bindd = SUPER SHIFT, V, Clipboard manager, exec, uwsm-app -- kitty --app-id yoink -e yoink
windowrule = float on, match:class ^yoink$
windowrule = center on, match:class ^yoink$
windowrule = size 1100 750, match:class ^yoink$

# --- Screenshots ---
bindd = SUPER SHIFT, S, Screenshot (region), exec, sh -c 'pkill slurp && exit 0; f=~/Pictures/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png; sel=$(slurp) && grim -g "$sel" "$f" && wl-copy < "$f" && (action=$(notify-send "Screenshot saved" "Click to edit" -t 10000 -i "$f" -A "default=edit"); [ "$action" = "default" ] && satty --filename "$f" --output-filename "$f" --copy-command wl-copy) &'
bindd = SUPER SHIFT, A, Screenshot (full), exec, sh -c 'f=~/Pictures/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png; grim "$f" && wl-copy < "$f" && notify-send "Screenshot saved" "$f" -t 3000 -i "$f"'
bindd = SUPER SHIFT, X, Screenshot (window), exec, sh -c 'f=~/Pictures/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png; grim -g "$(hyprctl activewindow -j | jq -r \"\\(.at[0]),\\(.at[1]) \\(.size[0])x\\(.size[1])\")" "$f" && wl-copy < "$f" && notify-send "Screenshot saved" "$f" -t 3000 -i "$f"'
bindd = SUPER SHIFT, C, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = SUPER SHIFT, T, OCR (text from screen), exec, sh -c 'grim -g "$(slurp)" - | tesseract - - | wl-copy && notify-send "OCR" "Text copied to clipboard"'

# --- Window Management ---
bindd = SUPER, Q, Close window, killactive,
bindd = SUPER, F, Fullscreen, fullscreen, 0
bindd = SUPER SHIFT, F, Tiled fullscreen, fullscreenstate, 0 2
bindd = SUPER, T, Toggle floating, exec, sh -c 'hyprctl dispatch togglefloating; if hyprctl activewindow -j | jq -e ".floating" > /dev/null; then hyprctl dispatch resizeactive exact 75% 75% && hyprctl dispatch centerwindow; fi'
bindd = SUPER, J, Toggle split, layoutmsg, togglesplit
bindd = SUPER, P, Pin window, pin,
bindd = SUPER, W, Close (tab in Brave), exec, sh -c 'class=$(hyprctl activewindow -j | jq -r .class); case "$class" in brave*|firefox*|chromium*) wtype -M ctrl -k w;; *) hyprctl dispatch killactive;; esac'
bindd = SUPER, TAB, Cycle windows, cyclenext,
bindd = SUPER SHIFT, TAB, Cycle windows reverse, cyclenext, prev

# --- Mouse (floating windows) ---
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# --- Lock Screen ---
bindd = SUPER ALT, L, Lock screen, exec, qs ipc -c noctalia-shell call lockScreen lock

# --- Focus ---
bindd = SUPER, LEFT, Focus left, movefocus, l
bindd = SUPER, RIGHT, Focus right, movefocus, r
bindd = SUPER, UP, Focus up, movefocus, u
bindd = SUPER, DOWN, Focus down, movefocus, d
bindd = SUPER, H, Focus left, movefocus, l
bindd = SUPER, L, Focus right, movefocus, r

# --- Move Windows ---
bindd = SUPER SHIFT, LEFT, Move left, movewindow, l
bindd = SUPER SHIFT, RIGHT, Move right, movewindow, r
bindd = SUPER SHIFT, UP, Move up, movewindow, u
bindd = SUPER SHIFT, DOWN, Move down, movewindow, d
bindd = SUPER SHIFT, H, Move left, movewindow, l
bindd = SUPER SHIFT, L, Move right, movewindow, r

# --- Workspaces ---
bindd = SUPER, code:10, Workspace 1, workspace, 1
bindd = SUPER, code:11, Workspace 2, workspace, 2
bindd = SUPER, code:12, Workspace 3, workspace, 3
bindd = SUPER, code:13, Workspace 4, workspace, 4
bindd = SUPER, code:14, Workspace 5, workspace, 5
bindd = SUPER, code:15, Workspace 6, workspace, 6
bindd = SUPER, code:16, Workspace 7, workspace, 7
bindd = SUPER, code:17, Workspace 8, workspace, 8
bindd = SUPER, code:18, Workspace 9, workspace, 9
bindd = SUPER SHIFT, code:10, Move to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move to workspace 9, movetoworkspace, 9
bindd = SUPER, Page_Down, Workspace down, workspace, e+1
bindd = SUPER, Page_Up, Workspace up, workspace, e-1
bindd = SUPER, mouse_down, Workspace next (scroll), workspace, e+1
bindd = SUPER, mouse_up, Workspace prev (scroll), workspace, e-1

# --- Resize ---
bindd = SUPER, plus, Grow width, resizeactive, 40 0
bindd = SUPER, 0, Shrink width, resizeactive, -40 0
bindd = SUPER SHIFT, plus, Grow height, resizeactive, 0 40
bindd = SUPER SHIFT, 0, Shrink height, resizeactive, 0 -40

# --- Media (Noctalia OSD) ---
bindeld = , XF86MonBrightnessUp, Brightness up, exec, qs ipc -c noctalia-shell call brightness increase
bindeld = , XF86MonBrightnessDown, Brightness down, exec, qs ipc -c noctalia-shell call brightness decrease
bindeld = SUPER, XF86MonBrightnessUp, Kbd brightness up, exec, brightnessctl -d kbd_backlight set +10%
bindeld = SUPER, XF86MonBrightnessDown, Kbd brightness down, exec, brightnessctl -d kbd_backlight set 10%-
bindeld = , XF86AudioRaiseVolume, Volume up, exec, qs ipc -c noctalia-shell call volume increase
bindeld = , XF86AudioLowerVolume, Volume down, exec, qs ipc -c noctalia-shell call volume decrease
bindeld = , XF86AudioMute, Mute, exec, qs ipc -c noctalia-shell call volume muteOutput
bindeld = , XF86AudioMicMute, Mic mute, exec, qs ipc -c noctalia-shell call volume muteInput
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Prev track, exec, playerctl previous

# --- System ---
bindd = SUPER SHIFT, E, Exit Hyprland, exit,
bindd = SUPER, BACKSPACE, Toggle transparency, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle
bindd = SUPER CTRL, P, Monitors off, dpms, off

# --- TUI tools (floating) ---
windowrule = float on, match:class ^impala$
windowrule = center on, match:class ^impala$
windowrule = size 600 400, match:class ^impala$
windowrule = float on, match:class ^bluetui$
windowrule = center on, match:class ^bluetui$
windowrule = size 600 400, match:class ^bluetui$
