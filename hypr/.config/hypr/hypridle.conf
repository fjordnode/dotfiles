general {
    lock_cmd = qs ipc -c noctalia-shell call lockScreen lock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on
    inhibit_sleep = 3
}

listener {
    timeout = 60
    on-timeout = brightnessctl -d apple-panel-bl -s set 10%
    on-resume = brightnessctl -d apple-panel-bl -r
}

listener {
    timeout = 60
    on-timeout = brightnessctl -sd kbd_backlight set 0
    on-resume = brightnessctl -rd kbd_backlight
}

listener {
    timeout = 120
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 120
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600
    on-timeout = systemctl suspend
}

listener {
    timeout = 300
    on-timeout = /home/hugo/.local/bin/lid-shutdown
}
