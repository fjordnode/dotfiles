# Hyprland config — standalone, no omarchy dependencies

# Wayland environment
env = XCURSOR_SIZE,26
env = HYPRCURSOR_SIZE,26
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

xwayland {
  force_zero_scaling = true
}

ecosystem {
  no_update_news = true
}

# Global window rules
windowrule = suppress_event maximize, match:class .*

# Noctalia layer rules
layerrule = blur on, match:namespace ^noctalia-background-
layerrule = ignore_alpha 0.5, match:namespace ^noctalia-background-

# User configs
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

source = /home/hugo/.config/hypr/noctalia/noctalia-colors.conf

# Privacy-sensitive windows
windowrule = no_screen_share on, match:class ^(1[pP]assword|Bitwarden)$
windowrule = no_screen_share on, match:class chrome-nngceckbapebfimnlniiiahkandclblb-Default

# Floating utility windows and file dialogs
windowrule = float on, match:tag floating-window
windowrule = center on, match:tag floating-window
windowrule = size 875 600, match:tag floating-window
windowrule = tag +floating-window, match:class (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus), match:title ^(Open.*Files?|Open [Ff]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to (open|save).*|[Cc]hoose.*)
windowrule = tag +floating-window, match:class ^(1[pP]assword|Bitwarden|org.gnome.NautilusPreviewer|org.gnome.Evince|com.gabm.satty|imv)$
windowrule = tag +floating-window, match:class chrome-nngceckbapebfimnlniiiahkandclblb-Default
windowrule = float on, match:class org.gnome.Calculator

# Picture-in-picture overlays
windowrule = tag +pip, match:title (Picture.?in.?[Pp]icture)
windowrule = float on, match:tag pip
windowrule = pin on, match:tag pip
windowrule = size 600 338, match:tag pip
windowrule = keep_aspect_ratio on, match:tag pip
windowrule = border_size 0, match:tag pip
windowrule = opacity 1.0 override 1.0 override, match:tag pip
windowrule = move (monitor_w-window_w-40) (monitor_h*0.04), match:tag pip

# Keep video/games from dimming or suspending while fullscreen.
windowrule = idle_inhibit fullscreen, match:class ^(firefox|org.mozilla.firefox|brave-browser|chromium|steam|com.libretro.RetroArch|vlc|mpv|com.obsproject.Studio)$

# Avoid transparency on media/capture apps.
windowrule = opacity 1.0 override 1.0 override, match:class ^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer|steam|com.libretro.RetroArch)$
