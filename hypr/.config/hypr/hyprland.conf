# Hyprland config — standalone, no omarchy dependencies

# Wayland environment
env = XCURSOR_SIZE,26
env = HYPRCURSOR_SIZE,26
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

xwayland {
  force_zero_scaling = true
}

ecosystem {
  no_update_news = true
}

# Global window rules
windowrule = suppress_event maximize, match:class .*

# Noctalia layer rules
layerrule = blur on, match:namespace ^noctalia-background-
layerrule = ignore_alpha 0.5, match:namespace ^noctalia-background-

# User configs
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

source = /home/hugo/.config/hypr/noctalia/noctalia-colors.conf

