# MacBook built-in display. highrr selects 120Hz on ProMotion panels.
monitor=eDP-1,highrr,auto,2

# External 4K 120Hz monitor.
monitor=HDMI-A-1,3840x2160@119.88,auto,2

# Fallback for any other panel/monitor when these dotfiles are stowed elsewhere.
# Uses the display's preferred mode, including high-refresh 4K panels, and lets
# Hyprland pick the scale instead of forcing the laptop scale globally.
monitor=,preferred,auto,auto
